global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.mail.me.com:587'
  smtp_from: 'carlos.ormeno@icloud.com'
  smtp_auth_username: 'carlos.ormeno@icloud.com'
  smtp_auth_password: 'TU_APP_SPECIFIC_PASSWORD'  # Generar en appleid.apple.com
  smtp_require_tls: true

route:
  receiver: 'email-default'
  group_by: [ 'alertname', 'job' ]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 3h
  routes:
  - match:
      severity: critical
    receiver: 'email-critical'
    group_wait: 5s
    repeat_interval: 30m
  - match:
      severity: warning
    receiver: 'email-warning'
    group_wait: 30s
    repeat_interval: 2h

receivers:
- name: 'email-default'
  email_configs:
  - to: 'carlos.ormeno@icloud.com'
    headers:
      Subject: '[Prometheus] {{ .GroupLabels.alertname }}'
    text: |
      {{ range .Alerts }}
      Alerta: {{ .Annotations.summary }}
      Descripción: {{ .Annotations.description }}
      Severidad: {{ .Labels.severity }}
      Servicio: {{ .Labels.job }}
      Estado: {{ .Status }}
      {{ end }}
    send_resolved: true

- name: 'email-critical'
  email_configs:
  - to: 'carlos.ormeno@icloud.com'
    headers:
      Subject: '[CRITICO] {{ .GroupLabels.alertname }} — Acción requerida'
    text: |
      !! ALERTA CRITICA !!

      {{ range .Alerts }}
      Alerta: {{ .Annotations.summary }}
      Descripción: {{ .Annotations.description }}
      Servicio: {{ .Labels.job }}
      Estado: {{ .Status }}
      {{ end }}
    send_resolved: true

- name: 'email-warning'
  email_configs:
  - to: 'carlos.ormeno@icloud.com'
    headers:
      Subject: '[WARNING] {{ .GroupLabels.alertname }}'
    text: |
      {{ range .Alerts }}
      Alerta: {{ .Annotations.summary }}
      Descripción: {{ .Annotations.description }}
      Servicio: {{ .Labels.job }}
      Estado: {{ .Status }}
      {{ end }}
    send_resolved: true

inhibit_rules:
- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: [ 'alertname', 'job' ]
