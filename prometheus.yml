global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'prometheus-lab-dia3'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:5000']
        labels:
          service: 'api-gateway'
          tier: 'microservice'

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:5001']
        labels:
          service: 'auth-service'
          tier: 'microservice'

  - job_name: 'data-service'
    static_configs:
      - targets: ['data-service:5002']
        labels:
          service: 'data-service'
          tier: 'microservice'

  - job_name: 'cve-exporter'
    static_configs:
      - targets: ['cve-exporter:5003']
        labels:
          service: 'cve-exporter'
          tier: 'security'
