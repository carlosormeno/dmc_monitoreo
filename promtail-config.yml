server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: microservices
    static_configs:
      - targets:
          - localhost
        labels:
          job: microservices
          __path__: /var/log/services/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: name
            message: message
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.999999"
          fallback_formats:
            - "2006-01-02 15:04:05,999"
